<body class="bg-gray-50">
<div class="mx-auto" style="max-width:390px">
  <!-- simulierte App-Top-Leiste -->
  <div class="sticky top-0 z-30 bg-white border-b border-gray-200 shadow-sm flex items-center justify-between px-4 h-14">
    <div><div class="text-[10px] font-semibold tracking-widest uppercase text-yellow-600 leading-tight">DJK Ottenhofen</div>
    <div class="font-bold text-gray-900 text-sm leading-tight">70 Jahre Jubiläumsfest</div></div>
    <div class="flex items-center gap-2 px-3 py-1.5 rounded-lg border bg-emerald-50 border-emerald-200"><span class="text-lg">⏱</span><div class="text-right leading-tight"><div class="font-bold text-sm text-emerald-900">20 Tage 6 Std</div><div class="text-[10px] text-emerald-700">bis zum Fest</div></div></div>
  </div>
  <div class="p-4">
    <!-- NEUER Finanz-Header (hell) -->
    <div class="bg-white -mx-4 -mt-4 px-4 pt-4 pb-4 mb-6 rounded-b-lg border-b border-gray-200">
      <div class="flex items-center justify-between gap-2">
        <h1 class="text-2xl font-bold text-gray-900">Finanzplanung</h1>
        <button class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-gray-300 bg-white text-gray-700 text-xs font-semibold hover:bg-gray-50 shadow-sm whitespace-nowrap"><span>📄</span> PDF exportieren</button>
      </div>
      <div class="flex gap-2 mt-4 overflow-x-auto pb-1">
        <button class="flex-1 min-w-[88px] flex items-center justify-center gap-2 px-3 py-3 rounded-xl text-sm font-semibold border whitespace-nowrap bg-white text-emerald-700 border-emerald-200 shadow-sm"><span class="text-base">📊</span> Gewinn</button>
        <button class="flex-1 min-w-[88px] flex items-center justify-center gap-2 px-3 py-3 rounded-xl text-sm font-semibold border whitespace-nowrap bg-white text-violet-700 border-violet-200 shadow-sm"><span class="text-base">🔮</span> Rohertrag</button>
        <button class="flex-1 min-w-[88px] flex items-center justify-center gap-2 px-3 py-3 rounded-xl text-sm font-semibold border whitespace-nowrap bg-blue-500 text-white border-blue-500 shadow-md"><span class="text-base">📋</span> Kosten</button>
        <button class="flex-1 min-w-[88px] flex items-center justify-center gap-2 px-3 py-3 rounded-xl text-sm font-semibold border whitespace-nowrap bg-white text-amber-700 border-amber-200 shadow-sm"><span class="text-base">🤝</span> Spenden</button>
      </div>
    </div>
    <div class="space-y-6">
      <!-- Gesamtkosten KPI -->
      <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-4 flex items-center gap-4" style="border-top-width:4px;border-top-color:#4F46E5">
        <div class="w-11 h-11 rounded-xl flex items-center justify-center text-xl shrink-0" style="background-color:#4F46E51A">💰</div>
        <div class="min-w-0"><div class="text-[10px] font-semibold uppercase tracking-wide text-gray-500">Gesamtkosten</div><div class="text-2xl font-extrabold text-gray-900 leading-none mt-1 whitespace-nowrap">12.150 €</div></div>
        <div class="ml-auto text-right shrink-0"><div class="text-xs text-gray-400">8 Positionen</div></div>
      </div>
      <!-- Fälligkeit -->
      <div class="space-y-3">
        <div class="flex items-center gap-2"><span class="w-1 h-4 rounded-full bg-indigo-600"></span><h2 class="text-xs font-bold uppercase tracking-wide text-gray-700">Fälligkeit</h2><span class="ml-auto text-[11px] text-gray-400">wichtigste Kennzahlen</span></div>
        <div class="grid grid-cols-3 gap-2">
          <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-3" style="border-top-width:4px;border-top-color:#7C3AED"><div class="w-8 h-8 rounded-xl flex items-center justify-center text-base mb-2" style="background-color:#7C3AED1A">📅</div><div class="text-[10px] font-semibold uppercase tracking-wide text-gray-500 leading-tight">Vor dem Fest</div><div class="text-base font-extrabold mt-1 leading-none whitespace-nowrap" style="color:#7C3AED">8.400 €</div><div class="text-[10px] text-gray-400 mt-1">5 Pos.</div></div>
          <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-3" style="border-top-width:4px;border-top-color:#EA580C"><div class="w-8 h-8 rounded-xl flex items-center justify-center text-base mb-2" style="background-color:#EA580C1A">🎪</div><div class="text-[10px] font-semibold uppercase tracking-wide text-gray-500 leading-tight">Während dem Fest</div><div class="text-base font-extrabold mt-1 leading-none whitespace-nowrap" style="color:#EA580C">2.250 €</div><div class="text-[10px] text-gray-400 mt-1">2 Pos.</div></div>
          <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-3" style="border-top-width:4px;border-top-color:#0891B2"><div class="w-8 h-8 rounded-xl flex items-center justify-center text-base mb-2" style="background-color:#0891B21A">📬</div><div class="text-[10px] font-semibold uppercase tracking-wide text-gray-500 leading-tight">Nach dem Fest</div><div class="text-base font-extrabold mt-1 leading-none whitespace-nowrap" style="color:#0891B2">1.500 €</div><div class="text-[10px] text-gray-400 mt-1">1 Pos.</div></div>
        </div>
      </div>
    </div>
  </div>
</div>
</body></html>
