name: Deploy to Hetzner

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner server (web01)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/djk-ottenhofen-event/app
            # Robust gegen lokale Server-Änderungen: sauber auf origin/main setzen,
            # statt mit "git pull" an lokalen Änderungen zu scheitern.
            git fetch origin main
            git checkout -f -B main origin/main
            npm install
            npx prisma generate
            npx prisma db push --accept-data-loss --skip-generate
            npm run build
            pm2 restart djk-ottenhofen-event || pm2 restart all
            pm2 save
            echo "Deployment completed at $(date)"
